apiVersion: v1
kind: Service
metadata:
  name: mywebservice
spec:
  selector:
    app: web-server      # Must match the Pod's label
  ports:
    - protocol: TCP
      port: 80           # The port the service exposes
      targetPort: 80     # The port the container is listening on
  type: NodePort         # Use ClusterIP if you only want internal access
